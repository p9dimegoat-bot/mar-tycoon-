<!DOCTYPE html>
<html>
<head>
<title>Mar Mega Tycoon 12345 - Upgraded</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
.box{background:#222;padding:15px;margin:10px;border-radius:10px;display:inline-block;width:260px;vertical-align:top;}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;}
input{padding:8px;border-radius:6px;border:none;}
#map{width:600px;height:360px;margin:auto;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);gap:5px;padding:10px;background:#333;}
.tile{background:#444;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
.achievements{background:#333;color:#0f0;padding:5px;margin:5px;border-radius:5px;text-align:left;}
</style>
</head>
<body>

<h1>💰 Mar Mega Tycoon 12345 - Upgraded</h1>

<div id="game">

<div class="box">
Player: <span id="player">Guest</span><br>
Money: $<span id="money">0</span><br>
MPS: <span id="mps">0</span><br>
Gems: 💎 <span id="gems">0</span><br>
Rebirths: <span id="rebirths">0</span><br>
Map Level: <span id="mapLevel">1</span>
</div>

<div class="box">
<h3>Work</h3>
<button onclick="work()">Work</button>
</div>

<div class="box">
<h3>Machines 1–5</h3>
<button onclick="buyMachine(50,1,0)">Machine 1 $50</button>
<button onclick="buyMachine(100,2,10)">Machine 2 $100</button>
<button onclick="buyMachine(200,3,20)">Machine 3 $200</button>
<button onclick="buyMachine(500,4,50)">Machine 4 $500</button>
<button onclick="buyMachine(1000,5,100)">Machine 5 $1000</button>
</div>

<div class="box">
<h3>Upgrade</h3>
<button onclick="upgrade()">Upgrade $500</button>
</div>

<div class="box">
<h3>Rebirth</h3>
<button onclick="rebirth()">Rebirth (1M)</button>
</div>

<div class="box">
<h3>Skins (Unlock by Money)</h3>
<button onclick="skin('dark')">Dark ($0)</button>
<button onclick="skin('blue')">Blue ($500)</button>
<button onclick="skin('green')">Green ($1000)</button>
<button onclick="skin('gold')">Gold ($1M)</button>
</div>

<div class="box">
<h3>Achievements</h3>
<div id="achievements"></div>
</div>

<h2>Your Tycoon Map</h2>
<div id="map"></div>

</div>

<script>
// ===== Game stats =====
let money=0, mps=0, gems=0, rebirths=0, mapLevel=1;
let achievementsUnlocked = [];

// ===== Work & Machines =====
function work(){ money+=1+rebirths; update(); checkAchievements(); }
function buyMachine(cost,power,bonusMPS){ 
  if(money>=cost){ money-=cost; mps+=power*(rebirths+1)+bonusMPS; update(); checkAchievements(); } 
}
function upgrade(){ if(money>=500){ money-=500; mps+=5; update(); checkAchievements(); } }
function rebirth(){ 
  if(money>=1000000){ rebirths++; gems+=5; money=0; mps=0; alert("REBIRTH!"); update(); checkAchievements(); } 
}
function skin(color){ 
  if(color==="dark") document.body.style.background="#111";
  if(color==="blue" && money>=500) document.body.style.background="#0b2a44";
  if(color==="green" && money>=1000) document.body.style.background="#0b4420";
  if(color==="gold" && money>=1000000) document.body.style.background="#FFD700";
}

// ===== Map / Rooms =====
function createMap(){
  let map=document.getElementById("map"); map.innerHTML="";
  for(let i=0;i<24;i++){
    let tile=document.createElement("div"); 
    tile.className="tile";
    tile.onclick=function(){
      if(money>=500){
        money-=500;
        tile.innerText="🏭";
        update();
        checkAchievements();
      }
    };
    map.appendChild(tile);
  }
}

// ===== Achievements / Milestones =====
function checkAchievements(){
  const achDiv = document.getElementById("achievements");
  achDiv.innerHTML = "";
  
  if(money>=100 && !achievementsUnlocked.includes("100Money")) { achievementsUnlocked.push("100Money"); alert("Achievement unlocked: $100!"); }
  if(money>=500 && !achievementsUnlocked.includes("500Money")) { achievementsUnlocked.push("500Money"); alert("Achievement unlocked: $500!"); }
  if(rebirths>=1 && !achievementsUnlocked.includes("1Rebirth")) { achievementsUnlocked.push("1Rebirth"); alert("Achievement unlocked: 1 Rebirth!"); }
  if(mapLevel>=2 && !achievementsUnlocked.includes("NewMap")) { achievementsUnlocked.push("NewMap"); alert("Achievement unlocked: Map Level 2!"); }

  achievementsUnlocked.forEach(a => {
    let d = document.createElement("div");
    d.className = "achievements";
    d.innerText = a;
    achDiv.appendChild(d);
  });

  // Unlock new map at 1M money
  if(money>=1000000 && mapLevel===1){
    mapLevel=2;
    document.getElementById("mapLevel").innerText = mapLevel;
    createMap();
  }
}

// ===== Update UI =====
function update(){
  document.getElementById("money").innerText=money;
  document.getElementById("mps").innerText=mps;
  document.getElementById("gems").innerText=gems;
  document.getElementById("rebirths").innerText=rebirths;
  document.getElementById("mapLevel").innerText=mapLevel;
}

// ===== Idle MPS / Auto-clicker =====
setInterval(()=>{ money+=mps; update(); checkAchievements(); },1000);

// ===== Init =====
createMap();
update();
</script>

</body>
</html>
