<!DOCTYPE html>
<html>
<head>
<title>Mar Mega Tycoon</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;}
.box{background:#222;padding:15px;margin:10px;border-radius:10px;display:inline-block;width:260px;vertical-align:top;}
button{padding:10px;margin:5px;border:none;border-radius:8px;cursor:pointer;}
input{padding:8px;border-radius:6px;border:none;}
#map{width:600px;height:360px;margin:auto;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);gap:5px;padding:10px;background:#333;}
.tile{background:#444;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;}
.chat{height:120px;overflow:auto;background:black;padding:10px;}
</style>
</head>
<body>

<h1>💰 Mar Mega Tycoon</h1>

<div id="login" class="box">
<h3>Login</h3>
<input id="username" placeholder="username">
<br><br>
<button onclick="login()">Play</button>
</div>

<div id="game" style="display:none">

<div class="box">
Player: <span id="player"></span><br>
Money: $<span id="money">0</span><br>
MPS: <span id="mps">0</span><br>
Gems: 💎 <span id="gems">0</span><br>
Rebirths: <span id="rebirths">0</span>
</div>

<div class="box">
<h3>Work</h3>
<button onclick="work()">Work</button>
</div>

<div class="box">
<h3>Machines</h3>
<button onclick="buyMachine(50,1)">Small $50</button>
<button onclick="buyMachine(200,5)">Factory $200</button>
<button onclick="buyMachine(1000,20)">Mega $1000</button>
</div>

<div class="box">
<h3>Upgrade</h3>
<button onclick="upgrade()">Upgrade $500</button>
</div>

<div class="box">
<h3>Rebirth</h3>
<button onclick="rebirth()">Rebirth (1M)</button>
</div>

<div class="box">
<h3>Skins</h3>
<button onclick="skin('dark')">Dark</button>
<button onclick="skin('blue')">Blue</button>
<button onclick="skin('green')">Green</button>
</div>

<div class="box">
<h3>Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div class="box">
<h3>Chat</h3>
<div class="chat" id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

<h2>Your Tycoon Map</h2>
<div id="map"></div>

</div>

<script>
let player="",money=0,mps=0,gems=0,rebirths=0;

function login(){
  player=document.getElementById("username").value;
  if(player===""){alert("Enter a username");return;}
  document.getElementById("login").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("player").innerText=player;
  load();
  createMap();
  update();
}

function work(){money+=1+rebirths;update();save();}
function buyMachine(cost,power){if(money>=cost){money-=cost;mps+=power*(rebirths+1);}update();save();}
function upgrade(){if(money>=500){money-=500;mps+=5;}update();save();}
function rebirth(){if(money>=1000000){rebirths++;gems+=5;money=0;mps=0;alert("REBIRTH!");}update();save();}
function skin(color){if(color==="dark") document.body.style.background="#111";if(color==="blue") document.body.style.background="#0b2a44";if(color==="green") document.body.style.background="#0b4420";}

function createMap(){
  let map=document.getElementById("map"); map.innerHTML="";
  for(let i=0;i<24;i++){
    let tile=document.createElement("div");
    tile.className="tile";
    tile.onclick=function(){if(money>=500){money-=500;tile.innerText="🏭";update();save();}};
    map.appendChild(tile);
  }
}

function send(){
  let msg=document.getElementById("msg").value; if(msg==="")return;
  let chat=document.getElementById("chat");
  let div=document.createElement("div"); div.innerText=player+": "+msg; chat.appendChild(div);
  document.getElementById("msg").value="";
  saveChat(player+": "+msg);
}

function update(){
  document.getElementById("money").innerText=money;
  document.getElementById("mps").innerText=mps;
  document.getElementById("gems").innerText=gems;
  document.getElementById("rebirths").innerText=rebirths;
  updateLeaderboard();
}

function save(){
  localStorage.setItem(player+"_money",money);
  localStorage.setItem(player+"_mps",mps);
  localStorage.setItem(player+"_gems",gems);
  localStorage.setItem(player+"_rebirths",rebirths);
  let chat=document.getElementById("chat"); localStorage.setItem("chat",chat.innerHTML);
}

function load(){
  money=parseInt(localStorage.getItem(player+"_money"))||0;
  mps=parseInt(localStorage.getItem(player+"_mps"))||0;
  gems=parseInt(localStorage.getItem(player+"_gems"))||0;
  rebirths=parseInt(localStorage.getItem(player+"_rebirths"))||0;
  document.getElementById("chat").innerHTML=localStorage.getItem("chat")||"";
}

function updateLeaderboard(){
  let players=[];
  for(let i=0;i<localStorage.length;i++){
    let key=localStorage.key(i);
    if(key.includes("_money")){
      let name=key.replace("_money","");
      let moneyVal=parseInt(localStorage.getItem(key))||0;
      players.push({name:name,money:moneyVal});
    }
  }
  players.sort((a,b)=>b.money-a.money);
  let board=document.getElementById("leaderboard"); board.innerHTML="";
  players.slice(0,5).forEach(p=>{let d=document.createElement("div");d.innerText=p.name+" - $"+p.money;board.appendChild(d);});
}

setInterval(()=>{money+=mps;update();save();},1000);
</script>

</body>
</html>
